name: CI Regression

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ee-tromokratis
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync

      - name: Build CUDA megakernel
        run: |
          make mk_llama mk_llama_3b

      - name: Run regression sweep
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: uv run megakernels/scripts/regression.py wandb_project=megakernels-ci wandb_enabled=True
